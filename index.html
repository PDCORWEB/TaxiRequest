<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDCOR Travel Portal</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(135deg,#1f4037,#99f2c8);
min-height:100vh;
display:flex;
justify-content:center;
padding:15px;
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
color:#fff;
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
letter-spacing:1px;
}

.card{
background:#ffffff;
border-radius:15px;
padding:20px;
margin-bottom:20px;
color:#333;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

input:focus{
outline:none;
border-color:#1f4037;
box-shadow:0 0 5px rgba(31,64,55,0.3);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#1f4037,#99f2c8);
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#msg{
margin-top:10px;
text-align:center;
font-weight:600;
}

.table-wrapper{
overflow-x:auto;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#1f4037;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

tr:nth-child(even){
background:#f9f9f9;
}

@media(max-width:480px){
h2{font-size:18px;}
button{font-size:14px;}
}
</style>
</head>

<body>

<div class="container">

<h2>🚖 PDCOR Travel Portal</h2>

<div class="card">
<form id="travelForm">
<input type="text" name="name" placeholder="Passenger Name" required>
<input type="text" name="to" placeholder="Destination (To)" required>
<input type="date" name="date" required>
<input type="time" name="time" required>
<button type="submit">Submit Travel Request</button>
</form>
<div id="msg"></div>
</div>

<div class="card">
<h3 style="margin-bottom:10px;">Recent Travel Records</h3>
<div class="table-wrapper">
<div id="tableData">Loading...</div>
</div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxp1bNTRN4z6Cm8nPatAZDyf-KT1pHnb3wyCs4OeuIFeuDEO0D1OenA61rT21PRiEg/exec";

document.getElementById("travelForm").addEventListener("submit", function(e){
e.preventDefault();

const msg = document.getElementById("msg");
msg.style.color="black";
msg.innerHTML="Submitting...";

const formData = Object.fromEntries(new FormData(this));

fetch(API_URL,{
method:"POST",
body:JSON.stringify(formData)
})
.then(res=>res.json())
.then(data=>{
msg.style.color="green";
msg.innerHTML="✔ Travel Request Submitted Successfully";
this.reset();
loadData();
})
.catch(err=>{
msg.style.color="red";
msg.innerHTML="Error submitting form";
});
});

function loadData(){
fetch(API_URL)
.then(res=>res.json())
.then(data=>{

if(!data.length){
document.getElementById("tableData").innerHTML="No Records Found";
return;
}

let html="<table><tr>";
data[0].forEach(h=> html+="<th>"+h+"</th>");
html+="</tr>";

for(let i=data.length-1;i>0;i--){
html+="<tr>";
data[i].forEach(c=> html+="<td>"+c+"</td>");
html+="</tr>";
}

html+="</table>";
document.getElementById("tableData").innerHTML=html;

});
}

loadData();

</script>

</body>
</html>
